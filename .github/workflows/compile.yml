name: Compile and Update Release

on:
  push:
    branches: [ "main" ] # Сборка при каждом пуше в main

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Обязательно для записи в релизы
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Board Package
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          
      - name: Install Libraries
        run: |
          arduino-cli lib install "TFT_eSPI"
          arduino-cli lib install "XPT2046_Touchscreen"
          arduino-cli lib install "ESPping"

      - name: Compile
        run: |
          # Компилируем (убедитесь, что папка называется ESP32CYD)
          arduino-cli compile --fqbn esp32:esp32:esp32 ./ESP32CYD

      - name: Update Latest Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          body: "Автоматическая сборка последней версии из ветки main."
          prerelease: true
          files: |
            ./ESP32CYD/build/esp32.esp32.esp32/ESP32CYD.ino.bin
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
