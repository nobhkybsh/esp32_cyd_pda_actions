name: Compile and Release

on:
  push:
    tags:
      - 'v*' # Запуск только при создании тега (например, v1.0)

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Необходимо для создания релиза
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Arduino CLI
        uses: arduino/setup-arduino-cli@v2

      - name: Install ESP32 Board Package
        run: |
          arduino-cli core update-index
          arduino-cli core install esp32:esp32
          
      - name: Install Libraries
        run: |
          arduino-cli lib install "TFT_eSPI"
          arduino-cli lib install "XPT2046_Touchscreen"
          arduino-cli lib install "ESPping"

      - name: Compile
        run: |
          arduino-cli compile --fqbn esp32:esp32:esp32 ./ESP32CYD

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ./ESP32CYD/build/esp32.esp32.esp32/ESP32CYD.ino.bin
